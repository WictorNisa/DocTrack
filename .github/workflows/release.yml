name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - platform: darwin-x64
            goos: darwin
            goarch: amd64
            ext: ""
          - platform: linux-x64
            goos: linux
            goarch: amd64
            ext: ""
          - platform: win32-x64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build binary
        working-directory: backend
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p "../npm/@doctrack/${{ matrix.platform }}/bin"
          go build -trimpath \
            -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "../npm/@doctrack/${{ matrix.platform }}/bin/doctrack${{ matrix.ext }}" .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: doctrack-${{ matrix.platform }}
          path: npm/@doctrack/${{ matrix.platform }}/bin/

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts/

      - name: Place binaries
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            mkdir -p "npm/@doctrack/${platform}/bin"
            src="npm-artifacts/doctrack-${platform}"
            if [ -d "$src" ]; then
              cp -r "$src/"* "npm/@doctrack/${platform}/bin/"
            fi
          done

      - name: Set version in package.json files
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for pkg in npm/@doctrack/*/package.json npm/doctrack/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg'));
              p.version = '${VERSION}';
              if (p.optionalDependencies) {
                for (const k of Object.keys(p.optionalDependencies)) {
                  p.optionalDependencies[k] = '${VERSION}';
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Make JS wrapper executable
        run: chmod +x npm/doctrack/bin/doctrack

      - name: Publish platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            cd npm/@doctrack/${platform}
            npm publish --provenance --access public || true
            cd ../../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: npm/doctrack
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
